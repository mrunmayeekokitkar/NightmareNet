# NightmareNet benchmark: CIFAR-10 classification (ResNet-18)
# Run: python scripts/train.py --config configs/benchmark_cifar10.yaml

model:
  name: resnet18
  type: image_classification
  num_labels: 10
  device: cpu

dataset:
  name: cifar10
  max_samples: 1000

training:
  wake_epochs: 1
  dream_epochs: 1
  nightmare_epochs: 1
  compress_epochs: 1
  num_cycles: 1
  batch_size: 8
  learning_rate: 3.0e-5

distortion:
  dream_strength: 0.25
  nightmare_strength: 0.75

compression:
  pruning_ratio: 0.15
  distill_temperature: 2.0

evaluation:
  strengths: [0.1, 0.3, 0.5, 0.7, 0.9]
  seed: 42

tracking:
  enabled: false
