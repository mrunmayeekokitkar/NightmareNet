# Example NightmareNet Optuna HPO Configuration

model:
  name: "gpt2"
  type: "causal_lm"
  max_length: 128

dataset:
  name: "wikitext"
  subset: "wikitext-2-raw-v1"

training:
  wake_epochs: 1
  dream_epochs: 1
  nightmare_epochs: 1
  num_cycles: 2
  batch_size: 4
  learning_rate: 5.0e-5

hpo:
  study_name: "nightmarenet-demo"
  storage: "sqlite:///nightmarenet_hpo.db"
  direction: "maximize"
  n_trials: 10
  pruning: true
  
  search_space:
    training.learning_rate:
      type: "float"
      low: 1.0e-5
      high: 1.0e-3
      log: true
      
    training.nightmare_lr_multiplier:
      type: "float"
      low: 1.0
      high: 5.0
      
    distortion.nightmare_strength:
      type: "float"
      low: 0.5
      high: 0.9
      
    training.batch_size:
      type: "categorical"
      choices: [4, 8, 16]
