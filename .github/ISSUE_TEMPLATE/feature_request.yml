name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: Feature requests help shape the roadmap. Please be specific about the problem you're solving.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem does this solve? What's the user pain point?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How would you solve it? What would the API/UX look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What other approaches did you consider? Why is this one better?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core training loop
        - Distortion engines
        - Compression/distillation
        - Evaluation/metrics
        - API layer
        - Frontend/dashboard
        - CI/CD/DevOps
        - Documentation
        - CLI
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your assessment)
      options:
        - Nice to have
        - Important
        - Critical

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List concrete, checkable conditions that define when this issue is complete.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        > **Important:** Please read [CONTRIBUTING.md](https://github.com/Adit-Jain-srm/NightmareNet/blob/main/CONTRIBUTING.md) in full before requesting assignment. Assignment requests without a technical approach will not be considered. PRs demonstrating thorough research, benchmarks, or creative approaches beyond minimum criteria may earn bonus XP labels.

        > **ECSoC'26 participants:** This repo is part of [Elite Coders Summer of Code 2026](https://github.com/Adit-Jain-srm/NightmareNet/blob/main/CONTRIBUTING.md#ecsoc26-contributors). Review the scoring rubric and bonus XP labels before starting work.
