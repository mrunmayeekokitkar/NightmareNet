name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `nightmarenet train --config ...`
        2. Observe error at step ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: NightmareNet version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.5"

  - type: input
    id: gpu
    attributes:
      label: GPU (if applicable)
      placeholder: "RTX 3050 Ti 4GB / None (CPU)"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      render: shell

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List concrete, checkable conditions that define when this issue is complete.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        > **Important:** Please read [CONTRIBUTING.md](https://github.com/Adit-Jain-srm/NightmareNet/blob/main/CONTRIBUTING.md) in full before requesting assignment. Assignment requests without a technical approach will not be considered. PRs demonstrating thorough research, benchmarks, or creative approaches beyond minimum criteria may earn bonus XP labels.

        > **ECSoC'26 participants:** This repo is part of [Elite Coders Summer of Code 2026](https://github.com/Adit-Jain-srm/NightmareNet/blob/main/CONTRIBUTING.md#ecsoc26-contributors). Review the scoring rubric and bonus XP labels before starting work.
