name: Stale Issues

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it hasn't had
            activity in 30 days. It will be closed in 7 days if no further activity occurs.
            If this is still relevant, please comment or update the issue.
          stale-pr-message: >
            This PR has been automatically marked as stale because it hasn't had
            activity in 21 days. It will be closed in 7 days if no further activity occurs.
            Please rebase and address any review comments to keep it open.
          days-before-stale: 30
          days-before-close: 7
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,critical"
          exempt-pr-labels: "pinned,wip"
